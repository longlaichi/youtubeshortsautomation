name: Post UltraHD Anime Reel

on:
  workflow_dispatch:
  schedule:
    # Morning post: 9:15 AM IST (03:45 UTC)
    - cron: "45 3 * * *"
    # Evening post: 7:00 PM IST (13:30 UTC)
    - cron: "30 13 * * *"

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install instagrapi pydrive2 oauth2client

      - name: Run bot
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          DRIVE_FOLDER_IDS: ${{ secrets.DRIVE_FOLDER_IDS }}
        run: |
          python main.py

      - name: Commit posted.json (if changed)
        if: always()
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add posted.json
            git commit -m "Update posted log [skip ci]"
            git push
          else
            echo "No changes to commit."
