name: YouTube Shorts Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"  # every 4 hours

permissions:
  contents: write  # needed to push updated posted.json

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true  # allows git push using GITHUB_TOKEN

      # 2️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3️⃣ Install FFmpeg system-wide
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # 4️⃣ Install Python dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5️⃣ Restore Google Service Account JSON
      - name: Restore Google Service Account
        run: echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT }}" > service_account.json

      # 6️⃣ Run YouTube Shorts bot
      - name: Run YouTube Shorts bot
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_IDS }}  # comma-separated folder IDs
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: python main.py

      # 7️⃣ Commit posted.json if changed
      - name: Commit posted.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posted.json
          if ! git diff --cached --quiet; then
            git commit -m "Update posted.json [skip ci]"
            git push origin HEAD:main
          else
            echo "No changes to commit."
