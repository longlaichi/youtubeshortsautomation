name: YouTube Shorts Automation

on:
  schedule:
    - cron: "0 */4 * * *"  # every 4 hours → 6 times a day
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository using built-in GITHUB_TOKEN
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # Ensure posted.json exists
      - name: Ensure posted.json exists
        run: |
          if [ ! -f posted.json ]; then
            echo "[]" > posted.json
          fi

      # Run the main upload script
      - name: Run upload script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python main.py

      # Commit and push posted.json using GITHUB_TOKEN
      - name: Checkout repository
  uses: actions/checkout@v3
  with:
    token: ${{ secrets.GITHUB_TOKEN }}  # built-in token, has push permission in Actions

- name: Commit and push posted.json
  run: |
    git config user.name "github-actions[bot]"
    git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
    git add posted.json
    git commit -m "Update posted.json after upload" || echo "No changes to commit"
    git push
  env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }
