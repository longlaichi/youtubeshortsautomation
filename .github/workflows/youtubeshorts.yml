name: YouTube Shorts Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"  # Runs every 4 hours, adjust as needed

permissions:
  contents: write  # Required for committing posted.json

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # 2️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3️⃣ Install FFmpeg
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # 4️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install yt-dlp

      # 5️⃣ Restore YouTube OAuth token
      - name: Restore YouTube token
        run: |
          echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | tr -d '\n' | base64 --decode > token.pickle

      # 6️⃣ Restore Google Service Account
      - name: Restore Google Service Account
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT }}" > service_account.json

      # 7️⃣ Run YouTube Shorts bot
      - name: Run YouTube Shorts bot
        env:
          DRIVE_FOLDER_IDS: ${{ secrets.DRIVE_FOLDER_IDS }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          YOUTUBE_TOKEN_B64: ${{ secrets.YOUTUBE_TOKEN_B64 }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}  # optional
        run: python main.py

      # 8️⃣ Commit posted.json if changed
      - name: Commit posted.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posted.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update posted.json [skip ci]"
            git push origin HEAD:main
