name: YTReelUploader

on:
  schedule:
    # Runs every 4 hours = 6 times per day
    - cron: "0 */4 * * *"
  workflow_dispatch: # allow manual trigger

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade --force-reinstall -r requirements.txt

      # Restore Google Drive token.pickle
      - name: Restore token.pickle
        run: |
          echo "${{ secrets.GDRIVE_TOKEN_B64 }}" | base64 --decode > token.pickle

      # Restore YouTube OAuth client_secret.json
      - name: Restore client_secret.json
        run: |
          echo "${{ secrets.CLIENT_SECRET_JSON_B64 }}" | base64 --decode > client_secret.json

      # Run main.py
      - name: Run main.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DRIVE_FOLDER_IDS: ${{ secrets.DRIVE_FOLDER_IDS }}
        run: python main.py

      # Commit posted.json if changed
      - name: Commit posted.json
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add posted.json
            git commit -m "Update posted log [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
