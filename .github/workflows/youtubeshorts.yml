name: YouTube Shorts Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"  # every 4 hours, adjust as needed

permissions:
  contents: write  # required for committing posted.json

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install yt-dlp

      # 🔑 Restore YouTube OAuth token
      - name: Restore YouTube token
        run: echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > token.pickle

      # 🔑 Set Google Service Account for Drive
      - name: Restore Google Service Account
        run: echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT }}" > service_account.json

      - name: Run YouTube Shorts bot
        env:
          DRIVE_FOLDER_IDS: ${{ secrets.DRIVE_FOLDER_IDS }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          YOUTUBE_TOKEN_B64: ${{ secrets.YOUTUBE_TOKEN_B64 }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}  # optional
        run: python main.py

      - name: Commit posted.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posted.json
          if ! git diff --cached --quiet; then
            git commit -m "Update posted.json [skip ci]"
            git push origin HEAD:main
          else
            echo "No changes to commit."
