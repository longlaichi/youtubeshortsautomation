name: YouTube Shorts Automation

on:
  schedule:
    - cron: "0 */4 * * *"  # every 4 hours → 6 times a day
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Ensure posted.json exists
        run: |
          if [ ! -f posted.json ]; then
            echo "[]" > posted.json
          fi

      - name: Run upload script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DRIVE_FOLDER_IDS: ${{ secrets.DRIVE_FOLDER_IDS }}
        run: |
          python main.py

      - name: Save posted.json
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Update posted.json after upload"
          file_pattern: posted.json
