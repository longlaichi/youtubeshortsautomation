name: Post UltraHD Anime Reel

on:
  workflow_dispatch:
  schedule:
    # Monday - 5:00 AM IST → 23:30 UTC (Sunday)
    - cron: "30 23 * * SUN"
    # Monday - 9:30 AM IST → 04:00 UTC
    - cron: "0 4 * * MON"
    # Monday - 9:00 PM IST → 15:30 UTC
    - cron: "30 15 * * MON"

    # Tuesday - 1:00 AM IST → 19:30 UTC (Monday)
    - cron: "30 19 * * MON"
    # Tuesday - 3:00 AM IST → 21:30 UTC (Monday)
    - cron: "30 21 * * MON"
    # Tuesday - 8:00 AM IST → 02:30 UTC
    - cron: "30 2 * * TUE"

    # Wednesday - 6:00 AM IST → 00:30 UTC
    - cron: "30 0 * * WED"
    # Wednesday - 7:00 AM IST → 01:30 UTC
    - cron: "30 1 * * WED"
    # Wednesday - 10:00 PM IST → 16:30 UTC
    - cron: "30 16 * * WED"

    # Thursday - 8:00 AM IST → 02:30 UTC
    - cron: "30 2 * * THU"
    # Thursday - 11:00 AM IST → 05:30 UTC
    - cron: "30 5 * * THU"
    # Thursday - 6:00 PM IST → 12:30 UTC
    - cron: "30 12 * * THU"

    # Friday - 4:00 AM IST → 22:30 UTC (Thursday)
    - cron: "30 22 * * THU"
    # Friday - 12:00 PM IST → 06:30 UTC
    - cron: "30 6 * * FRI"
    # Friday - 2:00 PM IST → 08:30 UTC
    - cron: "30 8 * * FRI"

    # Saturday - 10:00 AM IST → 04:30 UTC
    - cron: "30 4 * * SAT"
    # Saturday - 6:00 AM IST → 00:30 UTC
    - cron: "30 0 * * SAT"
    # Saturday - 7:00 PM IST → 13:30 UTC
    - cron: "30 13 * * SAT"

    # Sunday - 6:00 AM IST → 00:30 UTC
    - cron: "30 0 * * SUN"
    # Sunday - 7:00 AM IST → 01:30 UTC
    - cron: "30 1 * * SUN"
    # Sunday - 3:00 PM IST → 09:30 UTC
    - cron: "30 9 * * SUN"

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install instagrapi pydrive2 oauth2client

      - name: Run bot
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          DRIVE_FOLDER_IDS: ${{ secrets.DRIVE_FOLDER_IDS }}
        run: |
          python main.py

      - name: Commit posted.json (if changed)
        if: always()
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add posted.json
            git commit -m "Update posted log [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
