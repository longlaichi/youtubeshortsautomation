name: YTReelUploader

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade --force-reinstall -r requirements.txt

      # Restore Google Drive service account JSON
      - name: Restore GDrive Service Account JSON
        run: |
          echo "${{ secrets.GDRIVE_CREDS_JSON_B64 }}" | base64 --decode > gdrive_service_account.json

      # Run main.py
      - name: Run main.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DRIVE_FOLDER_IDS: ${{ secrets.DRIVE_FOLDER_IDS }}
        run: python main.py

      # Commit posted.json and youtube_token.pkl if changed
      - name: Commit updates
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add posted.json youtube_token.pkl
            git commit -m "Update logs and token [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
