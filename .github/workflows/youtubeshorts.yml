name: Post Motivational Reels to YouTube

on:
  workflow_dispatch:
  schedule:
    # 6 posts daily
    - cron: "30 2 * * *"   # 8:00 AM IST
    - cron: "30 6 * * *"   # 12:00 PM IST
    - cron: "30 10 * * *"  # 4:00 PM IST
    - cron: "30 14 * * *"  # 8:00 PM IST
    - cron: "30 18 * * *"  # 12:00 AM IST
    - cron: "30 22 * * *"  # 4:00 AM IST

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-auth google-auth-oauthlib google-api-python-client pydrive2 oauth2client opencv-python

      - name: Run YouTube bot
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          DRIVE_FOLDER_IDS: ${{ secrets.DRIVE_FOLDER_IDS }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
        run: |
          python main.py

      - name: Commit posted.json (if changed)
        if: always()
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add posted.json
            git commit -m "Update posted log [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
